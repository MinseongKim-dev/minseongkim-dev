version = 0.1

[default.global.parameters]
stack_name = "node-backend-dev"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
region = "ap-northeast-2"
# s3_bucket is supplied by the deploy workflow via --s3-bucket flag
# For local deploys: sam deploy --s3-bucket <your-artifact-bucket>
parameter_overrides = [
  "Stage=dev",
  "SesFromEmail=",
]

[prod.deploy.parameters]
stack_name = "node-backend-prod"
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
region = "ap-northeast-2"
parameter_overrides = [
  "Stage=prod",
  "SesFromEmail=",
]
