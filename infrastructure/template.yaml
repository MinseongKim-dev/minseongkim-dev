AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Node - AI Life Manager Backend

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Timeout: 30
    CodeUri: ../backend/
    Environment:
      Variables:
        TABLE_NAME: !Ref NodeTable
        BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
        BEDROCK_REGION: us-east-1
        MONTHLY_AI_BUDGET: "10.0"

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  AllowedOrigin:
    Type: String
    Default: "*"
    Description: >
      Allowed CORS origin. Keep '*' on initial deploy.
      After CloudFront is up, set to 'https://<cf-domain>.cloudfront.net'.

  ApiDomainName:
    Type: String
    Default: ""
    Description: >
      API Gateway domain for CloudFront API origin.
      Leave empty on first deployment. After deploy, copy ApiUrl output value
      (e.g. abc123.execute-api.ap-northeast-2.amazonaws.com) and redeploy.

  DomainName:
    Type: String
    Default: ""
    Description: >
      Custom domain (e.g. minseongkim.me). Leave empty to use the default
      CloudFront domain. Requires AcmCertificateArn to be set.

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: >
      ARN of an ACM certificate in us-east-1 that covers DomainName (and
      www.DomainName). Required when DomainName is set.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasApiDomainName: !Not [!Equals [!Ref ApiDomainName, ""]]
  HasCustomDomain: !Not [!Equals [!Ref AcmCertificateArn, ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Cognito ────────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "node-users-${Environment}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: display_name
          AttributeDataType: String
          Mutable: true
      UserPoolTags:
        Environment: !Ref Environment

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "node-web-${Environment}"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30

  # ── DynamoDB — Single Table Design ─────────────────────────────────────────
  NodeTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "node-main-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1-TypeDate
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2-Custom
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── Lambda Layer (shared Python dependencies) ───────────────────────────────
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "node-deps-${Environment}"
      Description: Shared Python dependencies (boto3)
      ContentUri: ../backend/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12

  # ── API Gateway — HTTP API ──────────────────────────────────────────────────
  NodeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            AuthorizationScopes:
              - openid
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 600

  # ── Lambda Functions ────────────────────────────────────────────────────────
  AiChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "node-ai-chat-${Environment}"
      Handler: handlers/ai_handler.handler
      Timeout: 60
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NodeTable
        - Statement:
            Effect: Allow
            Action: bedrock:InvokeModel
            Resource: "*"
      Events:
        Chat:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /ai/chat
            Method: POST

  CrudFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "node-crud-${Environment}"
      Handler: handlers/crud_handler.handler
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NodeTable
      Events:
        GetItems:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /{domain}
            Method: GET
        CreateItem:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /{domain}
            Method: POST
        UpdateItem:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /{domain}/{id}
            Method: PUT
        DeleteItem:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /{domain}/{id}
            Method: DELETE
        GetItem:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /{domain}/{id}
            Method: GET

  ProactiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "node-proactive-${Environment}"
      Handler: handlers/proactive_handler.handler
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NodeTable
        - Statement:
            Effect: Allow
            Action: bedrock:InvokeModel
            Resource: "*"
      Events:
        DailyBriefing:
          Type: Schedule
          Properties:
            Schedule: cron(0 22 * * ? *)
            Description: "Daily briefing at 07:00 KST"
            Enabled: true

  CareerCoachFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "node-career-coach-${Environment}"
      Handler: handlers/career_coach_handler.handler
      Timeout: 60
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NodeTable
        - Statement:
            Effect: Allow
            Action: bedrock:InvokeModel
            Resource: "*"
      Events:
        ProfileTarget:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /career/coach/profile
            Method: POST
        AssessState:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /career/coach/assess
            Method: POST
        GeneratePaths:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /career/coach/paths
            Method: POST
        SelectPath:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /career/coach/paths/{pathId}/select
            Method: POST
        RunCoaching:
          Type: HttpApi
          Properties:
            ApiId: !Ref NodeApi
            Path: /career/coach/coaching/{targetId}
            Method: POST

  # ── CloudWatch Alarm — Bedrock cost guard ──────────────────────────────────
  BedrockCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "node-bedrock-cost-warning-${Environment}"
      AlarmDescription: "Bedrock estimated cost >= $8 (80% of $10 monthly budget)"
      MetricName: BedrockEstimatedCost
      Namespace: Node/AI
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 8.0
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # ── S3 Bucket (frontend static assets) ─────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "node-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── CloudFront Distribution ─────────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "node-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "Node AI Life Manager - ${Environment}"
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
          - !If
            - HasApiDomainName
            - Id: ApiOrigin
              DomainName: !Ref ApiDomainName
              CustomOriginConfig:
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
            - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        CacheBehaviors:
          - !If
            - HasApiDomainName
            - PathPattern: !Sub "/${Environment}/*"
              TargetOriginId: ApiOrigin
              ViewerProtocolPolicy: https-only
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            - !Ref AWS::NoValue
        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
            - !Sub "www.${DomainName}"
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: "API Gateway (HTTP API) endpoint URL"
    Value: !Sub "https://${NodeApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  ApiDomainName:
    Description: "Use this for ApiDomainName parameter on second deployment"
    Value: !Sub "${NodeApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApiDomainName"

  CloudFrontDomain:
    Description: "Bare CloudFront domain — use as CNAME target in Namecheap DNS"
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDomain"

  CloudFrontUrl:
    Description: "Site URL (custom domain when configured, otherwise CloudFront default)"
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  FrontendBucketName:
    Description: "S3 bucket for frontend assets"
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucket"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientId"

  NodeTableName:
    Description: "DynamoDB single table name"
    Value: !Ref NodeTable
    Export:
      Name: !Sub "${AWS::StackName}-NodeTable"
