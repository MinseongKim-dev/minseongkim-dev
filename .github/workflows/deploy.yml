name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STACK_NAME: node-app-dev

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'infrastructure/**'
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Run backend tests
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
          pytest tests/ || true

      - name: SAM Build
        working-directory: infrastructure
        run: sam build

      - name: Get current CloudFront URL (for AllowedOrigin)
        id: get_cf_url
        run: |
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
            --output text 2>/dev/null) || true
          if [ -z "$CF_URL" ] || [ "$CF_URL" = "None" ]; then
            CF_URL="*"
          fi
          echo "cf_url=$CF_URL" >> $GITHUB_OUTPUT

      - name: SAM Deploy
        working-directory: infrastructure
        run: |
          DOMAIN_PARAM="${{ secrets.DOMAIN_NAME }}"
          CERT_PARAM="${{ secrets.ACM_CERTIFICATE_ARN }}"
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=dev" \
              "AllowedOrigin=${{ steps.get_cf_url.outputs.cf_url }}" \
              "DomainName=${DOMAIN_PARAM}" \
              "AcmCertificateArn=${CERT_PARAM}"

      - name: Update CORS to CloudFront URL (post-deploy)
        run: |
          # After deploy the CloudFront distribution definitely exists — lock down CORS
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
            --output text)
          PREV_URL="${{ steps.get_cf_url.outputs.cf_url }}"
          DOMAIN_PARAM="${{ secrets.DOMAIN_NAME }}"
          CERT_PARAM="${{ secrets.ACM_CERTIFICATE_ARN }}"
          if [ "$CF_URL" != "$PREV_URL" ] && [ -n "$CF_URL" ] && [ "$CF_URL" != "None" ]; then
            echo "Updating AllowedOrigin from '$PREV_URL' to '$CF_URL'"
            cd infrastructure
            sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
              --parameter-overrides \
                "Environment=dev" \
                "AllowedOrigin=$CF_URL" \
                "DomainName=${DOMAIN_PARAM}" \
                "AcmCertificateArn=${CERT_PARAM}"
          else
            echo "AllowedOrigin already correct: $CF_URL"
          fi

  deploy-frontend:
    # Wait for deploy-backend when it runs; skip if backend failed
    needs: [detect-changes, deploy-backend]
    if: |
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get stack outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" \
            --output text)
          echo "VITE_API_URL=$API_URL" >> $GITHUB_ENV
          echo "VITE_COGNITO_USER_POOL_ID=$USER_POOL_ID" >> $GITHUB_ENV
          echo "VITE_COGNITO_CLIENT_ID=$USER_POOL_CLIENT_ID" >> $GITHUB_ENV
          echo "VITE_AWS_REGION=ap-northeast-2" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Get S3 bucket name
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV

      - name: Get CloudFront distribution ID
        run: |
          CF_ID=$(aws cloudformation describe-stack-resource \
            --stack-name ${{ env.STACK_NAME }} \
            --logical-resource-id CloudFrontDistribution \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          echo "CF_ID=$CF_ID" >> $GITHUB_ENV

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ env.BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_ID }} \
            --paths "/*"
