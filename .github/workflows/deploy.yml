name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  STACK_NAME: node-backend-dev

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Run backend tests
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
          pytest tests/ -q || true

      - name: SAM build
        working-directory: backend
        run: sam build --cached --parallel

      - name: SAM deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --s3-bucket ${{ secrets.SAM_ARTIFACTS_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Stage=dev \
              "SesFromEmail=${{ secrets.SES_FROM_EMAIL }}"

  deploy-frontend:
    needs: [detect-changes, deploy-backend]
    if: |
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch stack outputs for Vite env
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text)
          CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" \
            --output text)
          echo "VITE_API_URL=$API_URL" >> $GITHUB_ENV
          echo "VITE_COGNITO_USER_POOL_ID=$USER_POOL_ID" >> $GITHUB_ENV
          echo "VITE_COGNITO_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV
          echo "VITE_AWS_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Fetch S3 bucket name and CloudFront ID
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stack-resource \
            --stack-name ${{ env.STACK_NAME }} \
            --logical-resource-id CloudFrontDistribution \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "CF_ID=$CF_ID" >> $GITHUB_ENV

      - name: Sync to S3
        run: |
          # Long-lived assets (hashed filenames) — cache aggressively
          aws s3 sync dist/ s3://${{ env.BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          # index.html must never be cached (SPA entry point)
          aws s3 cp dist/index.html s3://${{ env.BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_ID }} \
            --paths "/*"
